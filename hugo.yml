baseURL: https://if001.github.io/github-trending
title: GitHub Trending Reports

theme: PaperMod
Language:
    Direction: "ja"
    Locale: "ja"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: GitHub Trending Reports
  description: "GitHub Trending を週次で収集し、Hugo で公開するレポートサイト"
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        noClasses: false
pygmentsUseClasses: true
